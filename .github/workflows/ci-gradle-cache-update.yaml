# This workflow keeps the Gradle dependency caches up-to-date in the repository.
#
# A pull request build cannot update the cache of the upstream repository. Pull
# requests have a cache in the context of the fork of the upstream repository.
# A pull request build will lookup cache entries from the cache of the upstream
# repository in the case that a cache entry is missing in the pull request source
# repository's cache.
# To reduce cache misses for pull request builds, it is necessary that the
# caches in the upstream repository are up-to-date.

name: CI - Gradle Dependency Cache Update
on:
  # trigger on every commit to given branches
  push:
    branches:
      - master
  # trigger on a schedule so that the cache will be rebuilt if it happens to expire
  schedule:
    - cron: '30 */12 * * *'

env:
  JDK_DISTRIBUTION: corretto

jobs:
  update-gradle-dependencies-cache:
    name: Update Gradle dependency cache
    runs-on: ubuntu-24.04
    timeout-minutes: 45

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: Tune Runner VM
        uses: ./.github/actions/tune-runner-vm

      - name: Detect changed files
        if: ${{ github.event_name != 'schedule' }}
        id: changes
        uses: apache/pulsar-test-infra/paths-filter@master
        with:
          filters: |
            build_files:
              - '*.gradle.kts'
              - '**/*.gradle.kts'
              - 'gradle/**'
              - 'gradle.properties'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        if: ${{ github.event_name == 'schedule' || steps.changes.outputs.build_files == 'true' }}
        with:
          distribution: ${{ env.JDK_DISTRIBUTION }}
          java-version: 17

      - name: Setup Gradle
        if: ${{ github.event_name == 'schedule' || steps.changes.outputs.build_files == 'true' }}
        uses: gradle/actions/setup-gradle@0723195856401067f7a2779048b490ace7a47d7c

      - name: Download dependencies
        if: ${{ github.event_name == 'schedule' || steps.changes.outputs.build_files == 'true' }}
        run: |
          # resolve all dependencies to populate Gradle cache
          ./gradlew dependencies --no-configuration-cache || true
